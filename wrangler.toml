name = "narad"
compatibility_date = "2024-11-05"
compatibility_flags = ["nodejs_compat"]

[pages]
pages_build_output_dir = "dist"

[[kv_namespaces]]
binding = "NARAD_DATA"
id = "ca98881c7005404c8a0d00330759b80e"

[[kv_namespaces]]
binding = "OBSERVER_KV"
id = "ca98881c7005404c8a0d00330759b80e"

# Hermes Gateway uses existing KV for config storage
# binding = "HERMES_CONFIG" - using NARAD_DATA instead

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
PRIMARY_MODEL = "llama-3.3-70b-versatile"
SKILLS_REPO = "sdachary/narad"

# Observer Cron - polls every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# Hermes Gateway Configuration
[secrets]
telegram_bot_token = "Telegram Bot Token - add via wrangler secret put"
telegram_webhook_secret = "Webhook secret for verification"
narad_api_token = "API token for Narad service"
