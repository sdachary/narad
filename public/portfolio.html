<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Manager | Narad</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-canvas: #030712;
      --bg-surface: #111827;
      --bg-elevated: #1f2937;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.5);
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --border-subtle: rgba(255, 255, 255, 0.05);
      --status-success: #10b981;
      --status-error: #ef4444;
      --radius-xl: 24px;
      --radius-lg: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-canvas);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .back-btn {
      padding: 10px;
      border-radius: 12px;
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: var(--text-primary);
      transform: translateX(-4px);
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      padding: 24px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-subtle);
      background: linear-gradient(145deg, rgba(31, 41, 55, 0.4), rgba(17, 24, 39, 0.4));
    }

    .stat-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 900;
      font-family: 'JetBrains Mono', monospace;
    }

    .asset-list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn-add {
      background: var(--accent);
      color: white;
      padding: 12px 24px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 14px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-add:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .asset-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .asset-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      border-radius: var(--radius-lg);
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      transition: all 0.2s;
    }

    .asset-card:hover {
      border-color: var(--accent);
      transform: scale(1.01);
      background: var(--bg-elevated);
    }

    .asset-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .asset-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--bg-canvas);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: var(--accent);
      border: 1px solid var(--border-subtle);
    }

    .asset-name {
      font-weight: 700;
      font-size: 16px;
    }

    .asset-meta {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 600;
      margin-top: 2px;
    }

    .asset-values {
      text-align: right;
      margin-right: 24px;
    }

    .asset-price {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 16px;
    }

    .asset-qty {
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      padding: 8px;
      border-radius: 10px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-icon:hover {
      background: var(--bg-surface);
      color: var(--accent);
      border-color: var(--border-subtle);
    }

    .btn-delete:hover {
      color: var(--status-error);
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      width: 100%;
      max-width: 500px;
      background: var(--bg-surface);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-subtle);
      overflow: hidden;
      animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-body {
      padding: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full {
      grid-column: span 2;
    }

    label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }

    input {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      padding: 12px 16px;
      border-radius: 12px;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      background: var(--bg-surface);
    }

    .modal-footer {
      padding: 24px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      gap: 12px;
    }

    .btn-save {
      flex: 1;
      background: var(--accent);
      color: white;
      padding: 14px;
      border-radius: 14px;
      font-weight: 800;
      border: none;
      cursor: pointer;
    }

    .btn-cancel {
      flex: 1;
      background: var(--bg-elevated);
      color: var(--text-primary);
      padding: 14px;
      border-radius: 14px;
      font-weight: 800;
      border: 1px solid var(--border-subtle);
      cursor: pointer;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-canvas);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid var(--bg-elevated);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading" class="loading-overlay">
    <div class="loader"></div>
  </div>

  <div class="container">
  <div class="stats-grid" id="summary-grid" style="margin-bottom:24px;">
    <div class="stat-card">
      <div class="stat-label">Total Value</div>
      <div class="stat-value" id="total-value">₹0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Change</div>
      <div class="stat-value" id="change-value">₹0 (0%)</div>
    </div>
  </div>
    <header>
      <div class="brand" onclick="window.location.href='/'">
        <button class="back-btn"><i data-lucide="arrow-left"></i></button>
        <div>
          <h1 id="title">Portfolio Manager</h1>
          <div class="asset-meta">Narad Asset Management</div>
        </div>
      </div>
      <button class="btn-add" onclick="openModal()">
        <i data-lucide="plus"></i> Add Asset
      </button>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Portfolio Value</div>
        <div class="stat-value" id="total-value">₹0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Investments</div>
        <div class="stat-value" id="asset-count">0</div>
      </div>
    </div>

    <div class="asset-list-header">
      <h2 class="stat-label">Active Holdings</h2>
    </div>

    <div class="asset-grid" id="asset-grid">
      <!-- Assets will be injected here -->
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add New Asset</h3>
        <button class="btn-icon" onclick="closeModal()"><i data-lucide="x"></i></button>
      </div>
      <form id="asset-form" onsubmit="handleSave(event)">
        <input type="hidden" id="asset-id">
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group full">
              <label>Asset Name</label>
              <input type="text" id="name" required placeholder="e.g. Reliance Industries">
            </div>
            <div class="form-group">
              <label>Symbol</label>
              <input type="text" id="symbol" required placeholder="RELIANCE.NS">
            </div>
            <div class="form-group">
              <label>Type</label>
              <input type="text" id="type" required placeholder="Stock">
            </div>
            <div class="form-group">
              <label>Quantity</label>
              <input type="number" id="quantity" step="any" required placeholder="0">
            </div>
            <div class="form-group">
              <label>Current Value (Total)</label>
              <input type="number" id="current_value" step="any" required placeholder="0">
            </div>
            <div class="form-group full">
              <label>Sector</label>
              <input type="text" id="sector" placeholder="Energy">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-save">Save Asset</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let investments = [];

    async function fetchData() {
      try {
        const [invRes, sumRes] = await Promise.all([
          fetch('/api/management/investments'),
          fetch('/api/portfolio/summary')
        ]);
        const invData = await invRes.json();
        const sumData = await sumRes.json();
        investments = Array.isArray(invData) ? invData : [];
        // Populate summary UI
        document.getElementById('total-value').textContent = `₹${sumData.totalValue?.toLocaleString() || '0'}`;
        document.getElementById('change-value').textContent = `₹${sumData.change?.toLocaleString() || '0'} (${sumData.changePercent?.toString() || '0'}%)`;
        render();
      } catch (err) {
        console.error('Failed to fetch:', err);
      } finally {
        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
      }
    }

    function render() {
      const grid = document.getElementById('asset-grid');
      grid.innerHTML = '';
      
      let total = 0;
      investments.forEach(item => {
        total += parseFloat(item.current_value || 0);
        const card = document.createElement('div');
        card.className = 'asset-card';
        card.innerHTML = `
          <div class="asset-info">
            <div class="asset-icon">${(item.symbol || 'INV').substring(0, 3).toUpperCase()}</div>
            <div>
              <div class="asset-name">${item.name}</div>
              <div class="asset-meta">${item.type} · ${item.sector || 'General'}</div>
            </div>
          </div>
          <div style="display: flex; align-items: center;">
            <div class="asset-values">
              <div class="asset-price">₹${parseFloat(item.current_value || 0).toLocaleString()}</div>
              <div class="asset-qty">${item.quantity} units</div>
            </div>
            <div class="actions">
              <button class="btn-icon" onclick="openModal('${item.id}')"><i data-lucide="edit-2"></i></button>
              <button class="btn-icon btn-delete" onclick="handleDelete('${item.id}')"><i data-lucide="trash-2"></i></button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      document.getElementById('total-value').textContent = `₹${total.toLocaleString()}`;
      document.getElementById('asset-count').textContent = investments.length;
      lucide.createIcons();
    }

    function openModal(id = null) {
      const modal = document.getElementById('modal');
      const form = document.getElementById('asset-form');
      const title = document.getElementById('modal-title');
      
      form.reset();
      document.getElementById('asset-id').value = '';

      if (id) {
        const item = investments.find(i => i.id === id);
        if (item) {
          title.textContent = 'Edit Asset';
          document.getElementById('asset-id').value = item.id;
          document.getElementById('name').value = item.name;
          document.getElementById('symbol').value = item.symbol;
          document.getElementById('type').value = item.type;
          document.getElementById('quantity').value = item.quantity;
          document.getElementById('current_value').value = item.current_value;
          document.getElementById('sector').value = item.sector || '';
        }
      } else {
        title.textContent = 'Add New Asset';
      }

      modal.style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function handleSave(e) {
      e.preventDefault();
      const id = document.getElementById('asset-id').value;
      const data = {
        name: document.getElementById('name').value,
        symbol: document.getElementById('symbol').value,
        type: document.getElementById('type').value,
        quantity: parseFloat(document.getElementById('quantity').value),
        current_value: parseFloat(document.getElementById('current_value').value),
        sector: document.getElementById('sector').value,
        is_active: true
      };

      try {
        const method = id ? 'PATCH' : 'POST';
        const url = id ? `/api/management/investments/${id}` : '/api/management/investments';
        await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        closeModal();
        fetchData();
      } catch (err) {
        alert('Failed to save asset');
      }
    }

    async function handleDelete(id) {
      if (!confirm('Are you sure you want to delete this asset?')) return;
      try {
        await fetch(`/api/management/investments/${id}`, { method: 'DELETE' });
        fetchData();
      } catch (err) {
        alert('Failed to delete asset');
      }
    }

    // Init
    window.onload = () => {
        fetchData();
      lucide.createIcons();
    };
  </script>
</body>
</html>
