<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narad - AI Financial Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-layout">
        <header class="dashboard-header glass">
            <div class="header-content">
                <h1 class="dashboard-title">Narad</h1>
                <p class="dashboard-subtitle">Your AI Financial Assistant</p>
            </div>
            <div class="header-controls">
                <div class="control-group">
                    <label for="agent-type" class="control-label">Agent Mode:</label>
                    <select id="agent-type" class="control-select">
                        <option value="analyst">Financial Analyst</option>
                        <option value="advisor">Investment Advisor</option>
                        <option value="researcher">Research Specialist</option>
                    </select>
                </div>
                <div class="control-group theme-control">
                    <button id="theme-toggle" class="control-btn btn-icon" aria-label="Toggle theme">
                        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M12,4.5A1,1 0 0,1 13,3.5A1,1 0 0,1 14,4.5A1,1 0 0,1 13,5.5A1,1 0 0,1 12,4.5M12,17A2.5,2.5 0 0,0 14.5,19.5A2.5,2.5 0 0,0 17,17A2.5,2.5 0 0,0 14.5,14.5A2.5,2.5 0 0,0 12,17M12,9A3,3 0 0,1 15,12A3,3 0 0,1 12,15A3,3 0 0,1 9,12A3,3 0 0,1 12,9M20.75,6L19,4.25L17.75,5.5L19.5,7.25L20.75,6Z"></path></svg>
                    </button>
                </div>
            </div>
        </header>
        
        <main class="dashboard-main">
            <aside class="dashboard-sidebar glass">
                <div class="sidebar-section">
                    <h3 class="sidebar-title">Memory Bank</h3>
                    <div class="sidebar-toolbar">
                        <button id="clear-memory" class="btn-outline btn-sm" title="Clear Memory">
                            <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M6,19a2,2 0 0,0 2,2h8a2,2 0 0,0 2-2V7H6v12zM19,4h-3.5l-1-1h-5l-1,1H5v2h14V4z"/></svg>
                        </button>
                    </div>
                    <div id="memory-content" class="memory-list">
                        <div class="memory-item empty-state">
                            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M12,2L15,5H9L12,2M12,22L9,19H15L12,22M12,12A3,3 0 0,0 15,15A3,3 0 0,0 12,18A3,3 0 0,0 9,15A3,3 0 0,0 12,12M12,7a1,1 0 0,1 1,1v1a1,1 0 0,1-1,1H10a1,1 0 0,1-1-1V8a1,1 0 0,1 1-1h2z"/></svg>
                            <p>No memories stored yet</p>
                        </div>
                    </div>
                </div>
                
                <div class="sidebar-section">
                    <h3 class="sidebar-title">Quick Actions</h3>
                    <div class="action-grid">
                        <button class="btn-action" title="New Chat">
                            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M2,6V18C2,19.1 2.9,20 4,20H20C21.1,20 22,19.1 22,18V6C22,4.9 21.1,4 20,4H4C2.9,4 2,4.9 2,6Z"/></svg>
                            <span>New Conversation</span>
                        </button>
                        <button class="btn-action" title="Export Chat">
                            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M19,9H15V3H9V9H5V5H19V9Z"/></svg>
                            <span>Export</span>
                        </button>
                        <button class="btn-action" title="Settings">
                            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M12,4a8,8 0 0,1 8,8c0,4.42-3.58,8-8,8s-8-3.58-8-8c0-4.42,3.58-8,8-8m0,10c-1.1,0-2-.9-2-2s.9-2,2-2s2,.9,2,2s-.9,2-2,2m0,-6c0-2.21-1.79-4-4-4s-4,1.79-4,4s1.79,4,4,4s4-1.79,4-4"/></svg>
                            <span>Settings</span>
                        </button>
                    </div>
                </div>
            </aside>
            
            <section class="dashboard-content">
                <div class="chat-panel glass">
                    <div class="chat-header">
                        <h3 class="chat-title">Conversation</h3>
                        <div class="chat-status">
                            <span id="agent-status" class="status-badge">Ready</span>
                        </div>
                    </div>
                    <div id="chat-messages" class="chat-messages">
                        <div class="message bot-message">
                            <div class="message-avatar">
                                <svg width="32" height="32" viewBox="0 0 24 24"><path fill="currentColor" d="M12,2L15,5H9L12,2M12,22L9,19H15L12,22M12,12A3,3 0 0,0 15,15A3,3 0 0,0 12,18A3,3 0 0,0 9,15A3,3 0 0,0 12,12M12,7a1,1 0 0,1 1,1v1a1,1 0 0,1-1,1H10a1,1 0 0,1-1-1V8a1,1 0 0,1 1-1h2z"/></svg>
                            </div>
                            <div class="message-content">
                                Hello! I'm Narad, your AI financial assistant. How can I help you today?
                            </div>
                        </div>
                    </div>
                    <form id="chat-form" class="chat-form">
                        <div class="form-group">
                            <textarea 
                                id="user-input" 
                                placeholder="Ask about investments, stocks, portfolio analysis, or financial planning..." 
                                rows="4"
                                aria-label="Message input"
                            ></textarea>
                        </div>
                        <div class="form-actions">
                            <div class="input-options">
                                <button type="button" id="image-btn" class="btn-icon" title="Upload Image" aria-label="Upload image">
                                    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M9,16H17V14H9V16M12,2L2,7H5V9H11V13H5V15H11V17H13V15H19V9H13V7H16M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4Z"></path></svg>
                                </button>
                                <button type="button" id="voice-btn" class="btn-icon" title="Voice Input" aria-label="Voice input">
                                    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M12,14C10.9,14 10,13.1 10,12C10,10.9 10.9,10 12,10C13.1,10 14,10.9 14,12C14,13.1 13.1,14 12,14M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20C11.5,20 11,19.9 10.6,19.6L8,17V15H6V13H8V11H6V9H8V7H6V5H10.6L11,4.4C11.4,4 11.8,4 12,4Z"></path></svg>
                                </button>
                            </div>
                            <button type="submit" id="send-btn" class="btn-primary btn-lg">Send Message</button>
                        </div>
                    </form>
                </div>
                
                <div class="usage-panel glass">
                    <div classUsage-panel-header">
                        <h3 class="usage-title">System Usage</h3>
                    </div>
                    <div class="usage-ring-container">
                        <div class="usage-ring">
                            <div class="usage-ring-inner">
                                <div id="usage-percentage" class="usage-percentage">0%</div>
                            </div>
                        </div>
                        <div class="usage-details">
                            <div class="usage-item">
                                <span class="usage-label">Tokens Used</span>
                                <span id="usage-tokens" class="usage-value">0</span>
                            </div>
                            <div class="usage-item">
                                <span class="usage-label">Requests</span>
                                <span id="usage-requests" class="usage-value">0</span>
                            </div>
                            <div class="usage-item">
                                <span class="usage-label">Response Time</span>
                                <span id="usage-response-time" class="usage-value">0ms</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
