<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Narad — Multi-Agent AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <main class="app-container">
        <header class="app-header">
            <div class="logo-container">
                <img src="narad_logo.png" alt="Narad Logo" class="app-logo">
            </div>
            <div class="header-text">
                <h1>Narad</h1>
                <p>Multi-Agent AI Assistant</p>
            </div>
            <div class="header-controls">
                <div class="status-badge" id="service-status">
                    <span class="status-dot" id="api-dot"></span>
                    <span class="status-text" id="api-status">Connecting...</span>
                </div>
                <button class="usage-btn" id="usage-btn" title="View Usage">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 6v6l4 2"></path>
                    </svg>
                </button>
            </div>
        </header>

        <div class="main-content">
            <section class="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <div class="message assistant slide-up">
                        <div class="message-content">
                            👋 Greetings. I am Narad, your multi-agent AI assistant. I coordinate specialized agents to tackle complex tasks. How may I assist you today?
                        </div>
                    </div>
                </div>
                
                <div class="chat-input-area">
                    <form id="chat-form">
                        <input type="text" id="user-input" placeholder="Ask Narad anything..." autocomplete="off">
                        <button type="submit" id="send-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <!-- Usage Panel (Overlay) -->
    <div class="usage-overlay" id="usage-overlay">
        <div class="usage-modal">
            <div class="usage-header">
                <h2>📊 Agent Usage</h2>
                <button class="close-btn" id="close-usage">✕</button>
            </div>
            <div class="usage-grid" id="usage-grid">
                <!-- Ring charts will be inserted here -->
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
