<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Narad - AI Financial Assistant</title>
    
    <!-- Security Headers -->
    <meta name="csrf-token" content="">
    <meta name="api-base" content="">
    
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <div class="background-overlay"></div>
    <main class="app-container">
        <header class="app-header">
            <div class="header-text">
                <h1>Narad</h1>
                <p>Your AI Financial Assistant</p>
            </div>
            <div class="header-controls">
                <div class="status-badge" id="service-status" onclick="healthCheckRetries=0;checkApiHealth();" style="cursor:pointer;" title="Click to refresh">
                    <span class="status-dot" id="api-dot"></span>
                    <span class="status-text" id="api-status">Connecting...</span>
                </div>
                <div class="agent-selector">
                    <select id="agent-type" title="Select AI Agent" class="agent-select">
                        <option value="analyst">📊 Financial Analyst</option>
                        <option value="advisor">💰 Investment Advisor</option>
                        <option value="researcher">🔬 Research Specialist</option>
                    </select>
                </div>
                <div class="usage-ring" id="usage-ring">
                    <svg viewBox="0 0 36 36">
                        <circle class="ring-bg" cx="18" cy="18" r="15.5"></circle>
                        <circle class="ring-progress" cx="18" cy="18" r="15.5" stroke-dasharray="0, 100"></circle>
                    </svg>
                    <span class="tokens">--</span>
                    <span class="percent">--%</span>
                </div>
                <a href="chitragupta.html" class="control-btn btn-icon dashboard-btn" title="Financial Dashboard" style="color: var(--primary);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                </a>
                <button id="theme-toggle" class="control-btn btn-icon" aria-label="Toggle theme">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M12,4.5A1,1 0 0,1 13,3.5A1,1 0 0,1 14,4.5A1,1 0 0,1 13,5.5A1,1 0 0,1 12,4.5M12,17A2.5,2.5 0 0,0 14.5,19.5A2.5,2.5 0 0,0 17,17A2.5,2.5 0 0,0 14.5,14.5A2.5,2.5 0 0,0 12,17M12,9A3,3 0 0,1 15,12A3,3 0 0,1 12,15A3,3 0 0,1 9,12A3,3 0 0,1 12,9M20.75,6L19,4.25L17.75,5.5L19.5,7.25L20.75,6Z"></path></svg>
                </button>
                <button class="memory-toggle-btn" id="memory-toggle" title="Memory Panel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/><path d="M12 6v6l4 2"/></svg>
                </button>
            </div>
        </header>

        <div class="main-content">
            <!-- Memory Sidebar -->
            <aside class="memory-sidebar" id="memory-sidebar">
                <div class="memory-header">
                    <h2>🧠 Memory Bank</h2>
                    <button class="close-sidebar" id="close-sidebar">&times;</button>
                </div>
                
                <div class="memory-tabs">
                    <button class="memory-tab active" data-tab="ideas">💡 Ideas</button>
                    <button class="memory-tab" data-tab="search">🔍 Search</button>
                    <button class="memory-tab" data-tab="sync">☁️ Sync</button>
                </div>
                
                <div class="memory-panel active" id="ideas-panel">
                    <div class="save-idea-form">
                        <textarea id="idea-input" placeholder="Capture a financial insight..." rows="3"></textarea>
                        <div class="idea-tags">
                            <input type="text" id="idea-tags" placeholder="Tags (finance, stocks, etc)">
                        </div>
                        <button class="save-idea-btn" id="save-idea">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
                            Save Insight
                        </button>
                    </div>
                    <div class="ideas-list" id="ideas-list">
                        <div class="empty-state">No memories stored yet</div>
                    </div>
                </div>
                
                <div class="memory-panel" id="search-panel">
                    <div class="search-form">
                        <input type="text" id="memory-search-input" placeholder="Search memories...">
                        <button class="search-btn" id="memory-search-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        </button>
                    </div>
                    <div class="search-results" id="search-results">
                        <div class="empty-state">Search your semantic memory</div>
                    </div>
                </div>

                <div class="sidebar-section" style="padding: 20px; border-top: 1px solid var(--glass-border); margin-top: auto;">
                    <h3 class="sidebar-title" style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 15px;">Quick Actions</h3>
                    <div class="action-grid" style="display: grid; grid-template-columns: 1fr; gap: 8px;">
                        <a href="chitragupta.html" class="btn-action" title="Financial Dashboard" style="text-decoration: none; display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-secondary); cursor: pointer;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                            <span>Financial Dashboard</span>
                        </a>
                        <button class="btn-action" id="clear-chat-btn" title="New Chat" style="display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-secondary); cursor: pointer;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2,6V18C2,19.1 2.9,20 4,20H20C21.1,20 22,19.1 22,18V6C22,4.9 21.1,4 20,4H4C2.9,4 2,4.9 2,6Z"/></svg>
                            <span>New Conversation</span>
                        </button>
                        <button class="btn-action" title="Export Chat" style="display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-secondary); cursor: pointer;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19,9H15V3H9V9H5V5H19V9Z"/></svg>
                            <span>Export</span>
                        </button>
                    </div>
                </div>
            </aside>
            
            <!-- Chat Container -->
            <section class="chat-container">
                <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; border-bottom: 1px solid var(--border-subtle); background: var(--glass-bg);">
                    <h3 style="font-size: 0.9rem; font-weight: 600; color: var(--text-secondary);">Conversation</h3>
                    <span class="status-badge" style="padding: 4px 12px; font-size: 0.7rem;">Ready</span>
                </div>
                <div id="chat-messages" class="chat-messages">
                    <div class="message assistant slide-up">
                        <div class="avatar">⚡</div>
                        <div class="message-content">
                            Hello! I'm Narad, your AI financial assistant. How can I help you today?
                        </div>
                    </div>
                </div>
                
                <div class="chat-input-area">
                    <form id="chat-form">
                        <input type="file" id="image-input" accept="image/*" style="display: none;">
                        <button type="button" id="image-upload-btn" class="image-upload-btn" title="Upload image">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
                        </button>
                        <button type="button" id="voice-input-btn" class="voice-btn" title="Voice input">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </button>
                        <button type="button" id="voice-output-btn" class="voice-btn" title="Read aloud">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                        </button>
                        <div id="image-preview" class="image-preview" style="display: none;"></div>
                        <textarea id="user-input" placeholder="Ask about investments, stocks, or financial planning..." autocomplete="off" rows="1"></textarea>
                        <button type="submit" id="send-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </form>
                </div>
            </section>
        </div>
    </main>
    <script src="app.js" defer></script>
</body>
</html>
