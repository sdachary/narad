<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Narad — AI Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">⚡ Narad</div>
            </div>
            <div class="header-center">
                <div class="status-indicator">
                    <span class="status-dot" id="api-dot"></span>
                    <span id="api-status">Connecting...</span>
                </div>
                <select id="agent-select" class="agent-select">
                    <option value="general">General</option>
                    <option value="coding">Coding</option>
                    <option value="research">Research</option>
                    <option value="debugging">Debugging</option>
                    <option value="testing">Testing</option>
                    <option value="deployment">Deployment</option>
                </select>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="usage-btn" title="View Usage">📊</button>
            </div>
        </header>

        <!-- Main Terminal Area -->
        <main class="terminal-area">
            <div class="terminal-window" id="terminal">
                <div class="terminal-output" id="output"></div>
                <div class="terminal-input-row">
                    <span class="prompt">➜</span>
                    <input type="text" id="input" placeholder="Type your message..." autocomplete="off" spellcheck="false">
                </div>
            </div>
        </main>

        <!-- Usage Panel (Overlay) -->
        <div class="usage-overlay" id="usage-overlay">
            <div class="usage-modal">
                <div class="usage-header">
                    <h2>📊 Token Usage</h2>
                    <button class="close-btn" id="close-usage">✕</button>
                </div>
                <div class="usage-grid" id="usage-grid">
                    <!-- Ring charts will be inserted here -->
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
