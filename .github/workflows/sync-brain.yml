name: Sync Brain to Supabase

on:
  push:
    branches: [main]
    paths:
      - 'smriti/Projects/**'
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Sync Brain
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: https://facurlopyzmmrjnllsnd.supabase.co
        run: |
          echo "Syncing brain documents to Supabase..."

          # Sync SUMMARY files only (lean sync)
          for project in narad vishwakarma chitragupta indra unnati kanak career-ops social-blueprint-ai; do
            echo "Syncing $project SUMMARY..."
            SUPABASE_SERVICE_KEY=$SUPABASE_SERVICE_KEY \
              node scripts/sync-brain.js --project="$project" --summary-only || true
          done