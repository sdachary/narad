name: Deploy Narad to OCI VM

# Triggers:
#   1. Every push to main branch (auto-deploy on code change)
#   2. Manual trigger from GitHub Actions UI (Actions tab → Run workflow)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Opt-in to Node.js 24 for all actions to avoid deprecation warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          cli_config_credentials_hostname: app.terraform.io
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        env:
          # SSH key is passed via env var — avoids multi-line quoting issues in YAML
          TF_VAR_ssh_private_key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: terraform apply -auto-approve -input=false
