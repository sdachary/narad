# ══════════════════════════════════════════════════════════════════════
# Narad — NullClaw Config Template
# Copy to config.toml and fill in your actual values
# config.toml is gitignored — never commit it
# ══════════════════════════════════════════════════════════════════════

# ── Identity ─────────────────────────────────────────────────────────
[agent]
name    = "Narad"
persona = """
You are Narad — the private R&D intelligence assistant for Deepak,
founder of the Nisha Platform (Gold SaaS, CloudProvision, SyncLedger, AGI).

Your core jobs:
1. IDEA CAPTURE: When Deepak shares an idea, extract key concepts,
   tag it by service/domain, find related past ideas, store in Qdrant.
   Always reply: "Stored ✓ — linked to [N] related ideas: [list]"

2. RESEARCH: Search the web, summarise concisely. Lead with the
   most actionable insight. Max 4 sentences on Telegram.

3. ARCHITECTURE DRAFTS: Think step by step. For Nisha services,
   always consider: CF Workers constraints, OCI Always Free limits,
   Supabase RLS, Razorpay INR compatibility.

4. EXPERIMENT TRACKING: When Deepak mentions trying something,
   log it as an experiment with status: trying/success/abandoned.

5. VM OPS: Monitor disk/RAM/CPU. Alert if thresholds exceeded.
   Know that Nextcloud + Pi-hole + Tailscale run on this VM.

Tone: concise on Telegram, thorough on web UI.
You share memory with Bhaina (the customer-facing AGI) via narad_shared collection.
"""

# ── Models ───────────────────────────────────────────────────────────
[model]
provider    = "groq"
model       = "llama-3.3-70b-versatile"
temperature = 0.4
max_tokens  = 1200

[[model.fallbacks]]
provider = "openrouter"
model    = "google/gemini-2.0-flash-exp:free"

[[model.fallbacks]]
provider = "openrouter"
model    = "deepseek/deepseek-r1:free"

# ── API Keys (use env vars — never hardcode) ─────────────────────────
[keys]
groq         = "${GROQ_API_KEY}"
openrouter   = "${OPENROUTER_API_KEY}"
telegram_bot = "${TELEGRAM_BOT_TOKEN}"
brave_search = "${BRAVE_API_KEY}"
github       = "${GITHUB_PAT}"

# ── Memory ───────────────────────────────────────────────────────────
[memory]
engine  = "qdrant"
url     = "${QDRANT_URL}"
api_key = "${QDRANT_API_KEY}"

# Collections
# narad_rnd    — your private R&D ideas (Narad only)
# narad_shared — cross-pollinated knowledge (Bhaina can read)
# agi_memory   — Bhaina's collection (Narad reads, does not write)
primary_collection = "narad_rnd"
shared_collection  = "narad_shared"
bhaina_collection  = "agi_memory"    # read-only from Narad

# Embedding model
embedding_model = "openai/text-embedding-3-small"
embedding_via   = "openrouter"       # use openrouter for embeddings

# Local SQLite for fast tag-based recall (no network needed)
[memory.local]
enabled        = true
path           = "/home/ubuntu/.nullclaw/narad.db"
sync_to_qdrant = true

# ── Channels ─────────────────────────────────────────────────────────
[channels.telegram]
enabled       = true
bot_token     = "${TELEGRAM_BOT_TOKEN}"
chat_id       = "${TELEGRAM_CHAT_ID}"
allowed_users = ["${TELEGRAM_CHAT_ID}"]

[channels.web]
enabled  = true
port     = 7860
host     = "127.0.0.1"              # Tailscale only — not public internet
# Access at http://YOUR_TAILSCALE_IP:7860

# ── Knowledge files ──────────────────────────────────────────────────
[[knowledge.files]]
path   = "/home/ubuntu/narad/knowledge/nisha-platform.md"
reload = "on_change"

[[knowledge.files]]
path   = "/home/ubuntu/narad/knowledge/rnd-context.md"
reload = "on_change"

[[knowledge.files]]
path   = "/home/ubuntu/narad/knowledge/services/cloudprovision.md"
reload = "on_change"

[[knowledge.files]]
path   = "/home/ubuntu/narad/knowledge/services/gold-saas.md"
reload = "on_change"

[[knowledge.files]]
path   = "/home/ubuntu/narad/knowledge/services/syncledger.md"
reload = "on_change"

[[knowledge.files]]
path   = "/home/ubuntu/narad/knowledge/services/agi.md"
reload = "on_change"

# ── MCP Servers ──────────────────────────────────────────────────────
[[mcp.servers]]
name    = "filesystem"
type    = "stdio"
command = "npx"
args    = ["-y", "@modelcontextprotocol/server-filesystem",
           "/home/ubuntu/narad",
           "/home/ubuntu/nisha"]

[[mcp.servers]]
name    = "github"
type    = "stdio"
command = "npx"
args    = ["-y", "@modelcontextprotocol/server-github"]
env     = { GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_PAT}" }

[[mcp.servers]]
name    = "brave-search"
type    = "stdio"
command = "npx"
args    = ["-y", "@modelcontextprotocol/server-brave-search"]
env     = { BRAVE_API_KEY = "${BRAVE_API_KEY}" }

# ── Telegram Commands ─────────────────────────────────────────────────
[[commands]]
trigger     = "/idea"
description = "Capture an R&D idea"
prompt      = """
The user is sharing an R&D idea: {input}
1. Extract 3-5 key concept tags (service name, technology, pattern)
2. Search narad_rnd collection for related past ideas
3. Store in Qdrant with tags and timestamp
4. Also store a summary in narad_shared for Bhaina to access
5. Reply: "Stored ✓\nTags: [tags]\nLinked to: [related ideas if any]"
"""

[[commands]]
trigger     = "/recall"
description = "Search past R&D ideas"
prompt      = """
Search the narad_rnd Qdrant collection for ideas related to: {input}
Return top 3-5 matches with their tags and dates.
Format: numbered list, most relevant first.
"""

[[commands]]
trigger     = "/research"
description = "Research a topic"
prompt      = """
Research this topic for a SaaS founder building on Cloudflare + OCI + Supabase: {input}
Use web search. Lead with the most actionable insight.
Max 4 sentences. End with: "Want a deeper dive?"
"""

[[commands]]
trigger     = "/draft"
description = "Generate architecture or code draft"
prompt      = """
Generate a draft for: {input}
Context: Nisha Platform uses CF Workers, OCI Always Free VMs,
Supabase PostgreSQL, Razorpay (INR), Qdrant cloud, Groq/OpenRouter.
Be specific, use real names from the platform.
"""

[[commands]]
trigger     = "/status"
description = "VM health check"
prompt      = """
Check and report:
- CPU usage (warn if >75%)
- RAM usage (warn if >80%, critical if >90%)
- Disk usage (warn if >80%)
- Docker containers: Nextcloud, Pi-hole status
- Narad process uptime
Format as a clean status report with emoji indicators.
"""

[[commands]]
trigger     = "/nisha"
description = "Nisha platform status"
prompt      = """
Give a current status of the Nisha platform based on knowledge files:
- Services deployed and their status
- Recent changes or issues
- Top pending items from roadmap
Keep it brief — bullet points only.
"""

[[commands]]
trigger     = "/digest"
description = "Daily digest of recent ideas"
prompt      = """
Review the last 7 days of R&D ideas in narad_rnd collection.
Group related ideas. Identify emerging patterns or themes.
Suggest one concrete next action based on the patterns.
Format: grouped list + one recommendation.
"""

[[commands]]
trigger     = "/experiment"
description = "Log an experiment"
prompt      = """
Log this experiment: {input}
Format: { name, hypothesis, status: trying, service, date }
Store in narad_rnd with tag: experiment
Reply: "Experiment logged ✓ — I'll ask for an update in 3 days"
"""

# ── Scheduled Tasks ───────────────────────────────────────────────────
[[schedules]]
name = "morning-digest"
cron = "0 8 * * *"
task = """
Review last 24h of stored R&D ideas.
Find any new connections between ideas.
Send to Telegram:
📋 Morning Digest
• [N] ideas captured yesterday
• New connection found: [if any]
• Suggested next action: [one thing]
"""

[[schedules]]
name = "vm-health-check"
cron = "*/30 * * * *"
task = """
Check CPU, RAM, disk silently.
Only send Telegram alert if:
- RAM > 85%
- Disk > 80%
- Any Docker container is down
Otherwise do nothing.
"""

[[schedules]]
name = "weekly-rnd-summary"
cron = "0 9 * * 1"
task = """
Every Monday morning, review the past week of R&D ideas.
Group by Nisha service (cloudprovision, saas, syncledger, agi, narad).
Send a weekly R&D summary to Telegram.
Highlight: most active area, any breakthrough ideas, stale experiments.
"""
