# Narad Web UI Reverse Proxy
# Copy to: /etc/nginx/sites-available/narad

upstream narad_backend {
  server 127.0.0.1:7860;
  keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
  listen 80;
  server_name narad.yourdomain.com;
  
  # Redirect HTTP to HTTPS
  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl http2;
  server_name narad.yourdomain.com;
  
  # ── SSL Certificates ────────────────────────────
  ssl_certificate /etc/letsencrypt/live/narad.yourdomain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/narad.yourdomain.com/privkey.pem;
  
  # ── SSL Configuration ────────────────────────────
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_stapling on;
  ssl_stapling_verify on;
  
  # ── Security Headers ────────────────────────────
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  
  # ── Compression ────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml text/javascript 
    application/x-javascript application/xml+rss;
  gzip_disable "msie6";
  
  # ── Logging ────────────────────────────────────
  access_log /var/log/nginx/narad-access.log combined;
  error_log /var/log/nginx/narad-error.log warn;
  
  # ── Client limits ──────────────────────────────
  client_max_body_size 10M;
  client_body_timeout 30s;
  client_header_timeout 30s;
  keepalive_timeout 65s;
  send_timeout 30s;
  
  # ── Rate limiting ──────────────────────────────
  limit_req zone=general burst=10 nodelay;
  
  # ── Proxy settings ─────────────────────────────
  location / {
    limit_req zone=general burst=10 nodelay;
    
    proxy_pass http://narad_backend;
    proxy_http_version 1.1;
    
    # Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    
    # Keep-alive
    proxy_set_header Connection "";
  }
  
  # ── API endpoints (higher rate limit) ───────
  location /api/ {
    limit_req zone=api burst=20 nodelay;
    
    proxy_pass http://narad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  
  # ── Health check endpoint (no rate limit) ───
  location /health {
    access_log off;
    proxy_pass http://narad_backend;
    proxy_http_version 1.1;
  }
  
  # ── Static assets (aggressive caching) ──────
  location ~* ^/static/.*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
    proxy_pass http://narad_backend;
    proxy_cache_valid 200 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    expires 30d;
  }
}
